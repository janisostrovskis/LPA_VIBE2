# Gitleaks configuration for the LPA project.
# Extends the default ruleset; only adds allowlists.

[extend]
useDefault = true

# Project-wide allowlist for AWS's documented public example key.
# The literal below is AWS's canonical placeholder access key (published in
# their own docs at https://docs.aws.amazon.com/IAM/latest/UserGuide/security-creds.html),
# used here as an allowlist regex and in scripts/security_scan.py self-tests.
# It is NOT a real credential.
[allowlist]
description = "AWS canonical example access key, used in scanner self-tests and docs"
regexes = ['''AKIAIOSFODNN7EXAMPLE''']  # pragma: allowlist secret
