services:
  db:
    image: postgres:16-alpine
    container_name: lpa-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lpa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lpa}
      POSTGRES_DB: ${POSTGRES_DB:-lpa}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - lpa-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lpa} -d ${POSTGRES_DB:-lpa}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lpa-backend
    environment:
      # Libpq-compatible scheme (NOT the SQLAlchemy `postgresql+psycopg://` form,
      # which raw psycopg/libpq does not parse). The backend env loader in 00e
      # will derive the SQLAlchemy engine URL from this value.
      DATABASE_URL: ${DATABASE_URL:-postgresql://lpa:lpa@db:5432/lpa}  # pragma: allowlist secret
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lpa-frontend
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      # NEXT_PUBLIC_API_URL is consumed at build time by Next.js; for dev
      # the bind mount + npm run dev re-reads .env on every rebuild.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3000"
    volumes:
      - ./frontend:/app
      # Anonymous volumes shadow the bind mount so the container's own
      # node_modules/ (installed during `npm ci` in the Dockerfile) and
      # .next/ build output are not clobbered by the host's empty/stale
      # versions. Without these, `next dev` fails with missing-module errors.
      - /app/node_modules
      - /app/.next
    restart: "no"

volumes:
  lpa-db-data:
    name: lpa-db-data
