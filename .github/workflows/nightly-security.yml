name: Nightly Security Scan

# `on` must be quoted — YAML 1.1 parses bare `on:` as boolean True.
"on":
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  deep-scan:
    name: Deep Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dev dependencies
        run: cd backend && pip install -e .[dev]

      - name: Download gitleaks
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks

      - name: gitleaks (full history)
        run: >
          /tmp/gitleaks detect
          --source .
          --config .gitleaks.toml
          --no-banner
          --redact
          --exit-code 1
          --log-opts="--all"

      - name: pip-audit (transitive deps)
        # --skip-editable: the lpa-backend package is installed editable and
        #   does not exist on PyPI; pip-audit cannot resolve it.
        # --ignore-vuln entries are TRANSITIVE vulns we cannot fix from
        #   pyproject.toml directly; revisit when bumping FastAPI/MCP.
        #   TODO(00f or 01): drop these once upstream fix versions are in.
        #     - GHSA-7f5h-v6xp-fcq8: starlette 0.48 → 0.49.1 (FastAPI transitive)
        #     - GHSA-9h52-p55h-vw2f: mcp 1.12.2 → 1.23.0 (semgrep transitive)
        run: >
          cd backend && pip-audit --skip-editable
          --ignore-vuln GHSA-7f5h-v6xp-fcq8
          --ignore-vuln GHSA-9h52-p55h-vw2f

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly security scan failed — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              'The scheduled deep security scan failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Check gitleaks full-history and pip-audit output for findings.',
              '',
              'This issue was opened automatically. Close after triage.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'nightly-scan']
            });
