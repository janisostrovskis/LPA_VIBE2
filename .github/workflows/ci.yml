name: CI

# `on` must be quoted — YAML 1.1 parses bare `on:` as boolean True, which
# GitHub Actions then fails to recognize as a trigger config.
"on":
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: cd backend && pip install -e .[dev]

      - name: Ruff (Python)
        run: cd backend && ruff check .

      - name: ESLint (TypeScript)
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && npm ci && npx eslint .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: cd backend && pip install -e .[dev]

      - name: mypy (Python)
        # R3 mitigation: skip when backend/app does not exist yet to avoid
        # "no modules to check" error on the empty repo.
        if: hashFiles('backend/app/**/*.py') != ''
        run: cd backend && mypy app

      - name: tsc (TypeScript)
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && npm ci && npx tsc --noEmit

  cola-check:
    name: COLA Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check COLA import rules
        run: python scripts/check_cola_imports.py

  filesize-check:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check file sizes
        run: python scripts/check_file_size.py

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: cd backend && pip install -e .[dev]

      - name: pytest unit tests
        if: hashFiles('backend/tests/unit/**/*.py') != ''
        run: cd backend && pytest tests/unit -q

      - name: Vitest (frontend unit tests)
        if: hashFiles('frontend/package.json') != '' && hashFiles('frontend/src/**/*.test.*') != ''
        run: cd frontend && npm ci && npx vitest run

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    # NOTE: GitHub Actions does NOT allow `hashFiles()` in job-level `if:` —
    # only in step-level contexts. The skip is therefore applied per-step
    # below; the postgres service still starts even when no tests exist.
    # Acceptable cost until backend/tests/integration/ is populated.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: lpa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: cd backend && pip install -e .[dev]

      - name: pytest integration tests
        if: hashFiles('backend/tests/integration/**/*.py') != ''
        run: cd backend && pytest tests/integration -q
        env:
          DATABASE_URL: postgresql+psycopg://postgres:ci@localhost:5432/lpa_test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # NOTE: `hashFiles()` is not allowed in job-level `if:`. The branch gate
    # stays at job level (uses only `github.ref`); the playwright-config gate
    # is applied per-step below.
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        if: hashFiles('frontend/playwright.config.ts') != ''
        run: cd backend && pip install -e .[dev]

      - name: Install frontend dependencies
        if: hashFiles('frontend/playwright.config.ts') != ''
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        if: hashFiles('frontend/playwright.config.ts') != ''
        run: cd frontend && npx playwright install --with-deps

      - name: Run Playwright E2E tests
        if: hashFiles('frontend/playwright.config.ts') != ''
        run: cd frontend && npx playwright test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: cd backend && pip install -e .[dev]

      - name: bandit (Python SAST)
        # -ll = medium+ severity only; exits 1 on any finding.
        if: hashFiles('backend/app/**/*.py') != ''
        run: bandit -r backend/app -ll

      - name: semgrep
        # R6: pinned configs, never --config auto (non-reproducible).
        run: >
          semgrep scan
          --config p/python
          --config p/security-audit
          --error
          backend/

      - name: pip-audit
        # --skip-editable: the lpa-backend package is installed editable and
        #   does not exist on PyPI; pip-audit cannot resolve it.
        # No --strict: it conflicts with --skip-editable (editable skip
        #   counts as an unaudited package).
        # --ignore-vuln entries are TRANSITIVE vulns we cannot fix from
        #   pyproject.toml directly; revisit when bumping FastAPI/MCP.
        #   TODO(00f or 01): drop these once upstream fix versions are in.
        #     - GHSA-7f5h-v6xp-fcq8: starlette 0.48 → 0.49.1 (FastAPI transitive)
        #     - GHSA-9h52-p55h-vw2f: mcp 1.12.2 → 1.23.0 (semgrep transitive)
        run: >
          cd backend && pip-audit --skip-editable
          --ignore-vuln GHSA-7f5h-v6xp-fcq8
          --ignore-vuln GHSA-9h52-p55h-vw2f

      - name: Download gitleaks
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version

      - name: gitleaks (staged files)
        run: >
          /tmp/gitleaks detect
          --source .
          --config .gitleaks.toml
          --no-banner
          --redact
          --exit-code 1

      - name: gitleaks (full history)
        run: >
          /tmp/gitleaks detect
          --source .
          --config .gitleaks.toml
          --no-banner
          --redact
          --exit-code 1
          --log-opts="--all"

      - name: scripts/security_scan.py
        run: python scripts/security_scan.py

      - name: npm audit
        if: hashFiles('frontend/package.json') != ''
        run: cd frontend && npm audit --audit-level=moderate
