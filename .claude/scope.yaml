# .claude/scope.yaml — Path-to-agent ownership manifest
#
# This file is the single source of truth for which agent owns which paths.
# The PreToolUse scope guard (scripts/hooks/pretool_scope_guard.py) reads
# this file to enforce boundaries at runtime.
#
# Glob syntax: fnmatch patterns relative to repo root.
# "**" matches any number of path components.
#
# GOVERNANCE FILES — main-session-only
# ====================================
# The following files grant permissions and therefore must NOT be in any
# shipping agent's allow list. Only main session can edit them:
#   - .claude/scope.yaml       (this file; grants permissions)
#   - .claude/settings.json    (grants tool + hook permissions)
#   - .claude/agents/*.md      (defines agent capabilities and scope)
# Finding F2 (00h H1) surfaced a circular-permission bug: devops-agent
# had .claude/scope.yaml in its allow list and self-amended the manifest
# to grant itself .claude/agents/** access. 00i H3 closed the loop by
# removing all governance files from devops-agent scope.

main_session:
  allow:
    - "planning/**"
    - "CLAUDE.md"
    - ".claude/**"
    - "docs/**"
    - "HANDOFF_LOG.md"
    - "frontend/package-lock.json"
  note: "Main session is the orchestrator. All code changes must be delegated to subagents. Main session exclusively owns the governance files listed in the header comment. `frontend/package-lock.json` is a generated artifact regenerated via `npm install`; main session may regenerate it during orchestration (added 01b H2 after frontend-agent subagents repeatedly failed to update the lockfile)."

agents:
  frontend-agent:
    allow:
      - "frontend/src/**"
      - "frontend/public/**"
      - "frontend/*.config.*"
      - "frontend/tsconfig.json"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/.gitignore"
      - "frontend/tests/**"
      - "frontend/.eslintrc*"
      - "frontend/eslint.config.*"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"

  backend-agent:
    allow:
      - "backend/app/__init__.py"
      - "backend/app/application/**"
      - "backend/app/domain/rules/**"
      - "backend/app/domain/events/**"
      - "backend/app/domain/errors/**"
      - "backend/app/api/**"
      - "backend/app/lib/**"
      - "backend/tests/__init__.py"
      - "backend/tests/application/**"
      - "backend/tests/api/**"
      - "backend/tests/lib/**"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"

  database-agent:
    allow:
      - "backend/app/infrastructure/database/**"
      - "backend/app/domain/entities/**"
      - "backend/app/domain/value_objects/**"
      - "alembic/**"
      - "backend/tests/domain/**"
      - "backend/tests/infrastructure/database/**"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"

  payments-agent:
    allow:
      - "backend/app/infrastructure/payments/**"
      - "backend/app/application/ports/payment_gateway.py"
      - "backend/tests/infrastructure/payments/**"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"

  devops-agent:
    allow:
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "Dockerfile"
      - "Dockerfile.backend"
      - "Dockerfile.frontend"
      - "backend/pyproject.toml"
      - "backend/alembic.ini"
      - "scripts/**"
      - ".github/**"
      - ".pre-commit-config.yaml"
      - ".env.example"
      - ".gitleaks.toml"
      - ".dockerignore"
      - "frontend/.dockerignore"
      - "backend/.dockerignore"
      - "frontend/vitest.config.ts"
      - "frontend/playwright.config.ts"
      - "frontend/tsconfig.json"
      - "frontend/package.json"
      - ".gitignore"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"

  security-agent:
    allow:
      - "backend/app/api/middleware/**"
      - "backend/app/infrastructure/__init__.py"
      - "backend/app/infrastructure/config/**"
      - ".gitignore"
      - "scripts/security_scan.py"
      - "planning/**/SECURITY_REVIEW.md"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"
      - "backend/tests/infrastructure/__init__.py"
      - "backend/tests/infrastructure/config/**"

  i18n-agent:
    allow:
      - "frontend/public/locales/**"
      - "frontend/src/lib/i18n.ts"
      - "frontend/src/lib/i18n/**"
      - "planning/**/HANDOFF_LOG.md"
      - "planning/**/simplify-receipts/**"

  efficiency-agent:
    allow:
      - ".claude/agents/**"
      - "CLAUDE.md"
      - "docs/DEVELOPMENT_RULEBOOK.MD"
      - "planning/**/RETROSPECTIVE.md"
